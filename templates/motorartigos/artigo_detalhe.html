{% extends 'motorartigos/base.html' %}
{% load static %}

{% block title %}{{ artigo.id_fk_eixo.nome }}{% endblock %}

{% block content %}
<main class="container py-5">

  <a href="{% url 'index' %}" class="btn-back mb-4 d-inline-flex align-items-center gap-2">
    <i class="bi bi-arrow-left"></i> Voltar
  </a>

  <div class="mb-3 text-secondary">
    <i class="bi bi-clock"></i> {{ artigo.data_publicacao|date:"d/m/Y" }} &nbsp;
    <i class="bi bi-tag"></i> {{ artigo.id_fk_eixo.nome }} &nbsp;
    <i class="bi bi-person"></i> {{ artigo.id_fk_autor.nome }}
  </div>

  <div class="artigo-conteudo">
    {{ artigo.texto|safe }}
  </div>

</main>
{% endblock %}
