
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django DF</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <nav class="menu-container">
        <ul>
            <li><a href="https://www.python.org/doc/" target="_blank">Documentação Python</a></li>
            <li><a href="https://www.cursoemvideo.com/curso/redes-de-computadores/" target="_blank">Fundamentos Redes</a></li>
            <li><a href="https://www.elementsofai.com/br/" target="_blank">Fundamentos IA</a></li>
            <li><a href="https://www.kaggle.com/learn" target="_blank">Fundamentos Data Science</a></li>
            <li><a href="https://www.djangoproject.com/start/" target="_blank">Fundamentos Django</a></li>
        </ul>

        <div class="clima-box">
            <span id="clima-icone">⏳</span>
            <span id="clima-temp">--°C</span>
            <span id="clima-cidade">Brasília</span>
        </div>
    </nav>

    <script>
        async function buscarClimaReal() {
            try {
                // Coordenadas geográficas de Brasília (Latitude e Longitude)
                const url = "https://api.open-meteo.com/v1/forecast?latitude=-15.7801&longitude=-47.9292&current_weather=true";
                
                // Faz a requisição para a API
                const resposta = await fetch(url);
                const dados = await resposta.json();
                
                // Extrai a temperatura e o código de condição do tempo
                const temperatura = Math.round(dados.current_weather.temperature);
                const codigoTempo = dados.current_weather.weathercode;

                // 1. Atualiza a temperatura na tela
                document.getElementById('clima-temp').innerText = `${temperatura}°C`;

                // 2. Define o ícone correto baseado na condição do tempo (WMO Code)
                let icone = '☀️'; // Padrão: Céu limpo
                
                if (codigoTempo >= 1 && codigoTempo <= 3) {
                    icone = '🌤️'; // Parcialmente nublado
                } else if (codigoTempo >= 45 && codigoTempo <= 48) {
                    icone = '🌫️'; // Nevoeiro
                } else if (codigoTempo >= 51 && codigoTempo <= 67) {
                    icone = '🌧️'; // Chuva/Garoa
                } else if (codigoTempo >= 71 && codigoTempo <= 86) {
                    icone = '❄️'; // Neve
                } else if (codigoTempo >= 95) {
                    icone = '⛈️'; // Tempestade
                }

                // Atualiza o ícone na tela
                document.getElementById('clima-icone').innerText = icone;

            } catch (erro) {
                console.error("Erro ao buscar dados do clima:", erro);
                // Caso a API falhe, mostra um aviso amigável
                document.getElementById('clima-temp').innerText = "Erro";
                document.getElementById('clima-icone').innerText = "❌";
            }
        }

        // Executa a função automaticamente assim que a página termina de carregar
        buscarClimaReal();
    </script>
    <h1>Django DF</h1>
    <h4>Comunidade Django do Distrito Federal</h4>

    {% block content %}
    {% endblock %}

    {% include 'motorartigos/partials/_footer.html' %}
</body>
</html>
